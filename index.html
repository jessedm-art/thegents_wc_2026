<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Gents WC 2026 Bracket</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#faf9f7;
  --bg2:#f3f1ee;
  --surface:#ffffff;
  --surface2:#f7f6f3;
  --border:#e5e2db;
  --border2:#ccc9c1;
  --ink:#111111;
  --ink2:#333333;
  --muted:#8a8278;
  --accent:#111111;
  --red:#b91c1c;
  --red-light:#fef2f2;
  --green:#15803d;
  --green-light:#f0fdf4;
  --gold:#92400e;
  --gold-light:#fffbeb;
  --amber:#d97706;
  --r:4px;--rs:3px;
  /* legacy aliases */
  --text:var(--ink);--text2:var(--ink2);
  --blue:var(--ink);--blue-mid:#444;--blue-dim:#222;
  --blue-light:#f5f5f3;--blue-glow:rgba(0,0,0,.06);
  --orange:var(--ink);--orange-dim:#222;--orange-glow:rgba(0,0,0,.06);
  --surface3:var(--surface2);
}

/* ── DARK THEME ── */
[data-theme="dark"]{
  --bg:#0f0f0f;
  --bg2:#1a1a1a;
  --surface:#1c1c1e;
  --surface2:#252525;
  --border:#2c2c2e;
  --border2:#3a3a3c;
  --ink:#f2f2f7;
  --ink2:#d1d1d6;
  --muted:#8e8e93;
  --accent:#f2f2f7;
  --red:#ff453a;
  --red-light:#2c1010;
  --green:#30d158;
  --green-light:#0a2018;
  --gold:#ffd60a;
  --gold-light:#221f00;
  --amber:#ff9f0a;
  --bar-bg:rgba(15,15,15,.95);
  --text:var(--ink);--text2:var(--ink2);
  --blue:var(--ink);--blue-mid:#888;--blue-dim:#aaa;
  --blue-light:#1e1e1e;--blue-glow:rgba(255,255,255,.04);
  --orange:var(--ink);--orange-dim:#aaa;--orange-glow:rgba(255,255,255,.04);
  --surface3:var(--surface2);
}

/* ── PURPLE THEME ── */
[data-theme="purple"]{
  --bg:#0b0812;
  --bg2:#120e22;
  --surface:#16112a;
  --surface2:#1e1838;
  --border:#2e2558;
  --border2:#3d3278;
  --ink:#ede8ff;
  --ink2:#c8bcf5;
  --muted:#8070b8;
  --accent:#a78bfa;
  --red:#f87171;
  --red-light:#2a0e28;
  --green:#34d399;
  --green-light:#062218;
  --gold:#fbbf24;
  --gold-light:#1c1400;
  --amber:#a78bfa;
  --bar-bg:rgba(11,8,18,.95);
  --text:var(--ink);--text2:var(--ink2);
  --blue:#a78bfa;--blue-mid:#7c3aed;--blue-dim:#6d28d9;
  --blue-light:#1e1838;--blue-glow:rgba(167,139,250,.08);
  --orange:#a78bfa;--orange-dim:#7c3aed;--orange-glow:rgba(167,139,250,.08);
  --surface3:var(--surface2);
}
[data-theme="purple"] .nav-btn.active{color:#a78bfa;border-top-color:#a78bfa;}
[data-theme="purple"] .btn-primary{background:#7c3aed;}
[data-theme="purple"] .btn-primary:hover{background:#6d28d9;}
[data-theme="purple"] .team-pill.selected,[data-theme="purple"] .team-pill.winner{background:#7c3aed;border-color:#7c3aed;}
[data-theme="purple"] .uprogress-fill,[data-theme="purple"] .lb-rank-num.p1{background:#a78bfa;}
[data-theme="purple"] .you-badge{background:#7c3aed;}
[data-theme="purple"] .check-label input{accent-color:#a78bfa;}
[data-theme="purple"] .field input:focus{border-color:#a78bfa;box-shadow:0 0 0 2px rgba(167,139,250,.2);}

/* ── MOBILE-FRIENDLY auto class ── */
html.is-mobile .team-pill{padding:9px 10px;min-height:44px;}
html.is-mobile .nav-btn{padding:11px 4px 11px;}
html.is-mobile .nav-label{font-size:10px;}
html.is-mobile .qcard{min-height:108px;padding:20px 8px 18px;}
html.is-mobile .btn-primary{min-height:54px;font-size:15px;}
html.is-mobile .btn-secondary{min-height:50px;}
html.is-mobile .field input{padding:13px 14px;font-size:15px;}
@media(hover:none)and(pointer:coarse){
  .team-pill{min-height:40px;}
  .btn-gear{padding:10px;}
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* ── Layout ── */
#app{min-height:100vh;display:flex;flex-direction:column;}
.screen{flex:1;padding-bottom:90px;min-height:100vh;}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:200;height:calc(52px + env(safe-area-inset-top));display:flex;flex-direction:column;justify-content:flex-end;padding:env(safe-area-inset-top) 18px 0;background:var(--bar-bg,rgba(250,249,247,.96));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.top-bar-inner{display:flex;align-items:center;justify-content:space-between;width:100%;height:52px;}
.top-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-.01em;}
.top-user{font-size:12px;font-weight:600;color:var(--muted);}
.btn-gear{background:none;border:none;font-size:17px;cursor:pointer;padding:8px;opacity:.5;transition:opacity .2s;line-height:1;}
.btn-gear:hover{opacity:1;}
.top-spacer{height:calc(52px + env(safe-area-inset-top));}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;background:var(--bar-bg,rgba(250,249,247,.97));backdrop-filter:blur(20px);border-top:1px solid var(--border);padding-bottom:max(env(safe-area-inset-bottom),8px);}
.nav-btn{flex:1;background:none;border:none;padding:10px 4px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);transition:color .15s;border-top:2px solid transparent;position:relative;}
.nav-btn.active{color:var(--ink);border-top-color:var(--ink);}
.nav-icon{font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;height:20px;}
.nav-label{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}

/* ── Buttons ── */
.btn-primary{display:flex;align-items:center;justify-content:center;width:100%;padding:14px;min-height:50px;background:var(--ink);color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;border:none;border-radius:var(--rs);cursor:pointer;transition:background .15s,transform .1s;letter-spacing:.02em;}
.btn-primary:active{transform:scale(.98);}
.btn-primary:hover{background:#222;}
.btn-primary:disabled,.btn-primary.loading{opacity:.4;cursor:default;}
.btn-secondary{display:flex;align-items:center;justify-content:center;width:100%;padding:13px;min-height:46px;background:var(--surface);color:var(--ink2);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;border:1px solid var(--border2);border-radius:var(--rs);cursor:pointer;transition:background .15s,border-color .15s;margin-top:8px;}
.btn-secondary:hover{background:var(--bg2);border-color:var(--ink);}
.btn-link{background:none;border:none;color:var(--ink);font-size:13px;cursor:pointer;padding:0;text-decoration:underline;}

/* ── Fields ── */
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;}
.field input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--rs);color:var(--ink);padding:11px 14px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s,box-shadow .15s;}
.field input:focus{border-color:var(--ink);box-shadow:0 0 0 2px rgba(0,0,0,.08);}
.check-label{display:flex;align-items:center;gap:10px;font-size:13px;cursor:pointer;margin-bottom:14px;color:var(--ink2);}
.check-label input{width:15px;height:15px;accent-color:var(--ink);}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin:0 16px 14px;}
.card-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--ink);margin-bottom:14px;}

/* ── Team Pill ── */
.team-pill{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .12s;margin-bottom:4px;}
.team-pill:last-child{margin-bottom:0;}
.team-pill:hover{border-color:var(--ink);background:var(--bg2);}
.team-pill.selected{background:var(--ink);border-color:var(--ink);}
.team-pill.selected .pill-name{color:#fff;}
.team-pill.selected .pill-badge{background:rgba(255,255,255,.2);color:#fff;}
.team-pill.winner{background:var(--ink);border-color:var(--ink);}
.team-pill.winner .pill-name{color:#fff;}
.team-pill.locked{cursor:default;}
.team-pill.disabled{opacity:.3;cursor:not-allowed;}
.flag-circle{width:20px;height:20px;border-radius:50%;background:transparent;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.team-pill.selected .flag-circle,.team-pill.winner .flag-circle{background:transparent;}
.pill-name{flex:1;min-width:0;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink);}
.pill-badge{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.pill-badge.empty{display:none;}
.pill-badge.pos1,.pill-badge.pos2,.pill-badge.wc,.pill-badge.win{background:rgba(255,255,255,.25);color:#fff;}
.team-pill:not(.selected) .pill-badge.pos1{background:var(--ink);color:#fff;}
.team-pill:not(.selected) .pill-badge.pos2{background:#444;color:#fff;}
.team-pill:not(.selected) .pill-badge.wc{background:#5b21b6;color:#fff;}

/* ── Toast / Error ── */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-weight:600;padding:10px 22px;border-radius:50px;z-index:9999;font-size:13px;animation:fadeUp 2.5s ease forwards;white-space:nowrap;}
@keyframes fadeUp{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}
/* ── Save Success Overlay ── */
.save-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:10000;display:flex;align-items:center;justify-content:center;animation:soFadeIn .18s ease forwards;}
.save-overlay.out{animation:soFadeOut .3s ease forwards;}
.save-card{background:var(--surface);border-radius:16px;padding:32px 40px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.22);animation:soPop .22s cubic-bezier(.34,1.56,.64,1) forwards;}
.save-check{width:56px;height:56px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;animation:soCheck .3s ease .1s both;}
.save-check svg{width:28px;height:28px;stroke:#fff;stroke-width:2.5;fill:none;}
.save-card-title{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.save-card-sub{font-size:13px;color:var(--muted);}
@keyframes soFadeIn{from{opacity:0}to{opacity:1}}
@keyframes soFadeOut{from{opacity:1}to{opacity:0}}
@keyframes soPop{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes soCheck{from{transform:scale(0)}to{transform:scale(1)}}
.error-banner{background:var(--red-light);border-bottom:1px solid #fecaca;color:var(--red);padding:10px 16px;font-size:13px;text-align:center;font-weight:500;}
.err-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;display:flex;align-items:center;justify-content:center;animation:soFadeIn .18s ease forwards;}
.err-overlay.out{animation:soFadeOut .3s ease forwards;}
.err-card{background:var(--surface);border-radius:16px;padding:28px 32px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.22);max-width:300px;animation:soPop .22s cubic-bezier(.34,1.56,.64,1) forwards;}
.err-icon{width:48px;height:48px;border-radius:50%;background:#ef4444;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.err-icon svg{width:24px;height:24px;stroke:#fff;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.err-card-title{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.err-card-sub{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5;}
.err-dismiss{background:var(--ink);color:var(--bg);border:none;border-radius:8px;padding:8px 24px;font-size:14px;font-weight:600;cursor:pointer;}
.uavatar-me{background:var(--green)!important;}
.uname-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.group-picks-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);}
.group-picks-row .picks-group-label{width:48px;flex-shrink:0;}
.back-btn{background:none;border:none;color:var(--ink);font-size:22px;cursor:pointer;padding:0;line-height:1;display:flex;align-items:center;}
.locked-pill{display:inline-flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--border2);color:var(--muted);padding:4px 12px;border-radius:50px;font-size:11px;font-weight:600;margin-top:8px;}

/* ════════════════════════════════════
   SETUP SCREEN
════════════════════════════════════ */
.setup-wrap{max-width:480px;margin:0 auto;padding:48px 16px 48px;}
.setup-eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:10px;}
.setup-h1{font-family:'Playfair Display',serif;font-size:34px;font-weight:800;text-align:center;margin-bottom:6px;color:var(--ink);line-height:1.15;}
.setup-sub{text-align:center;color:var(--muted);margin-bottom:36px;font-size:13px;}
.badge-sm{background:var(--bg2);color:var(--muted);font-size:10px;padding:2px 7px;border-radius:3px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.hint-text{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.6;}
.share-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:14px;margin-top:12px;}
.share-box code{display:block;word-break:break-all;color:var(--ink);font-size:11px;margin:6px 0;font-family:monospace;}
.btn-copy{background:var(--surface);border:1px solid var(--border2);color:var(--ink2);padding:6px 14px;border-radius:var(--rs);cursor:pointer;font-size:12px;font-weight:600;}
.btn-copy:hover{background:var(--border);}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;}
.score-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;display:flex;justify-content:space-between;align-items:center;}
.score-item span:first-child{font-size:12px;color:var(--muted);}
.score-item strong{color:var(--ink);font-size:13px;font-weight:700;}
.info-list{list-style:none;padding:0;}
.info-list li{padding:8px 0 8px 20px;position:relative;font-size:13px;color:var(--ink2);border-bottom:1px solid var(--border);}
.info-list li:last-child{border:none;}
.info-list li::before{content:'→';position:absolute;left:0;color:var(--muted);}

/* ════════════════════════════════════
   HOME SCREEN
════════════════════════════════════ */
.home-hero{padding:36px 20px 24px;text-align:center;border-bottom:1px solid var(--border);}
.greeting{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-bottom:10px;}
.home-hero h2{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;margin-bottom:22px;color:var(--ink);line-height:1.1;}
.progress-ring-wrap{position:relative;display:inline-block;margin-bottom:12px;}
.ring-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:17px;font-weight:700;color:var(--ink);line-height:1;}
.ring-sub{font-size:10px;color:var(--muted);display:block;margin-top:-2px;font-weight:400;}
.hero-sub{font-size:13px;color:var(--muted);}
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:16px;}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 8px 16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .12s;text-align:center;min-height:96px;justify-content:center;}
.qcard:hover,.qcard:active{border-color:var(--ink);background:var(--bg2);}
.qcard-icon{font-size:24px;margin-bottom:2px;}
.qcard-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink2);}
.qcard-sub{font-size:13px;color:var(--muted);font-weight:600;}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:0 16px 10px;}
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.user-card{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;margin:0 16px 8px;cursor:pointer;transition:border-color .12s;}
.user-card:hover{border-color:var(--ink);}
.user-card.is-me{border-color:var(--ink);}
.uavatar{width:36px;height:36px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;color:#fff;}
.uinfo{flex:1;min-width:0;}
.uname{font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:6px;}
.you-badge{font-size:9px;background:var(--ink);color:#fff;padding:1px 6px;border-radius:2px;font-weight:700;text-transform:uppercase;}
.uprogress{height:2px;background:var(--border);border-radius:2px;margin-top:6px;}
.uprogress-fill{height:100%;border-radius:2px;background:var(--ink);transition:width .6s;}
.uscore{font-size:18px;font-weight:700;color:var(--ink);}
.uscore-pts{font-size:10px;color:var(--muted);font-weight:400;}

/* ════════════════════════════════════
   GROUPS SCREEN
════════════════════════════════════ */
.screen-hero{padding:24px 18px 16px;border-bottom:1px solid var(--border);}
.screen-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:6px;}
.screen-h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;margin-bottom:4px;color:var(--ink);}
.screen-sub{font-size:13px;color:var(--muted);}
.groups-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px;}
@media(max-width:340px){.groups-grid{grid-template-columns:1fr;}}
.gcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px;}
.gcard.done{border-color:var(--ink);}
.gcard-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.gcard-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.gcard-check{color:var(--green);font-size:12px;font-weight:700;}
.gcard-hint{font-size:10px;color:var(--muted);}
.action-bar{padding:16px;display:flex;flex-direction:column;gap:8px;}

/* ════════════════════════════════════
   WILDCARDS SCREEN
════════════════════════════════════ */
.wc-progress-bar{height:3px;background:var(--border);margin:12px 16px 0;overflow:hidden;}
.wc-progress-fill{height:100%;background:var(--ink);transition:width .4s;}
.wc-count-row{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 16px;}
.wc-count{font-size:13px;font-weight:500;color:var(--muted);}
.wc-count strong{color:var(--ink);font-weight:700;}
.wc-hint-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin:0 16px 16px;font-size:13px;color:var(--ink2);line-height:1.6;}
.wc-group-section{margin:0 16px 16px;}
.wc-group-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.wc-group-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* ════════════════════════════════════
   BRACKET SCREEN — VISUAL TREE
════════════════════════════════════ */
.bracket-scroll{overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;padding:40px 16px 24px;background:var(--bg);}
.bracket-tree{position:relative;}
.bk-card{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;}
.bk-card.dim{opacity:.4;}
.bk-team{display:flex;align-items:center;gap:6px;padding:5px 8px;height:26px;font-size:11px;font-weight:500;color:var(--ink);transition:background .1s;}
.bk-team.clickable{cursor:pointer;}
.bk-team.clickable:hover{background:var(--bg2);}
.bk-team.won{background:var(--ink);color:#fff;}
.bk-flag{font-size:13px;width:18px;text-align:center;flex-shrink:0;line-height:1;}
.bk-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bk-team.won .bk-name{color:#fff;}
.bk-name.tbd-text{color:var(--muted);font-style:italic;font-size:10px;}
.bk-chk{font-size:9px;font-weight:700;flex-shrink:0;color:#fff;}
.bk-divider{height:1px;background:var(--border);}
.bk-round-label{position:absolute;top:-24px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);white-space:nowrap;}
.bk-champ-wrap{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.bk-champ-trophy{font-size:30px;}
.bk-champ-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);}
.bk-champ-name{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--ink);text-align:center;line-height:1.3;}

/* ════════════════════════════════════
   ALL PICKS SCREEN
════════════════════════════════════ */
.picks-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 16px;}
.ptab{flex:1;padding:12px 4px;background:none;border:none;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);transition:all .12s;text-align:center;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid transparent;margin-bottom:-1px;}
.ptab.active{color:var(--ink);border-bottom-color:var(--ink);}
.picks-body{padding:0 16px;}
.picks-group-row{display:flex;gap:6px;margin-bottom:12px;align-items:flex-start;padding-top:14px;border-top:1px solid var(--border);}
.picks-group-label{width:52px;flex-shrink:0;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding-top:12px;}
.picks-user-col{flex:1;min-width:80px;}
.picks-username{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.picks-team-pill{display:flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--border);border-radius:50px;padding:4px 8px;margin-bottom:3px;font-size:11px;color:var(--ink);}
.picks-team-pill .flag-sm{font-size:12px;}

/* ════════════════════════════════════
   LEADERBOARD SCREEN
════════════════════════════════════ */
.lb-top3{padding:20px 18px 16px;}
.lb-top3-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);}
.lb-top3-item:first-child{padding-top:0;}
.lb-rank-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;width:36px;text-align:center;flex-shrink:0;color:var(--muted);}
.lb-rank-num.p1{color:var(--ink);}
.lb-rank-medal{font-size:22px;width:36px;text-align:center;flex-shrink:0;}
.lb-avatar{width:38px;height:38px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:16px;flex-shrink:0;}
.lb-avatar.p2{background:#666;}
.lb-avatar.p3{background:#999;}
.lb-name{flex:1;min-width:0;font-size:14px;font-weight:600;color:var(--ink);}
.lb-pct{font-size:11px;color:var(--muted);margin-top:2px;}
.lb-title{font-size:10px;color:var(--muted);font-style:italic;margin-bottom:1px;line-height:1.3;}
.lb-score-col{text-align:right;flex-shrink:0;min-width:54px;}
.lb-score{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--ink);}
.lb-pts{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.lb-list{padding:0 18px 16px;}
.lb-item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;}
.lb-item.is-me{border-color:var(--ink);border-width:1.5px;}
.lb-rank{width:28px;font-size:13px;font-weight:700;text-align:center;color:var(--muted);flex-shrink:0;}
.lb-name-sm{flex:1;min-width:0;font-size:13px;font-weight:600;color:var(--ink);}
.lb-score-sm{font-size:18px;font-weight:700;color:var(--ink);}
.lb-pts-sm{font-size:10px;color:var(--muted);}

/* Admin results */
.admin-card{margin-top:20px;}
.results-group-row{margin-bottom:14px;}
.rg-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;}
.rg-teams{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.rg-check{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink2);padding:5px 0;}
.rg-check input{accent-color:var(--ink);}
.wc-res-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}

/* ── Leaderboard view tabs ── */
.lb-view-tabs{display:flex;gap:6px;padding:12px 16px 0;}
.lb-view-tab{flex:1;padding:9px;text-align:center;font-size:11px;font-weight:600;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;}
.lb-view-tab.active{background:var(--ink);color:white;border-color:var(--ink);}
.lb-view{display:none;}
.lb-view.active{display:block;}

/* ── Score breakdown sheet ── */
.bd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;opacity:0;transition:opacity .2s;pointer-events:none;}
.bd-overlay.open{opacity:1;pointer-events:all;}
.bd-sheet{position:fixed;bottom:0;left:0;right:0;max-height:88vh;overflow-y:auto;background:var(--surface);border-radius:18px 18px 0 0;z-index:401;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,1,.23,1);padding-bottom:max(env(safe-area-inset-bottom),24px);}
.bd-sheet.open{transform:translateY(0);}
.bd-sheet-header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 10px;}
.bd-sheet-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.bd-close{background:none;border:none;font-size:26px;cursor:pointer;color:var(--muted);padding:0 4px;line-height:1;}
.bd-total-bar{margin:0 20px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.bd-section{padding:0 20px 14px;}
.bd-section-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
.bd-row{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.bd-row:last-child{border-bottom:none;}
.bd-hit-icon{width:16px;text-align:center;flex-shrink:0;font-size:11px;}
.bd-hit-icon.hit{color:var(--green);}
.bd-hit-icon.miss{color:var(--red);}
.bd-team{flex:1;color:var(--ink2);}
.bd-pts{font-size:12px;font-weight:700;color:var(--ink);min-width:26px;text-align:right;}

/* ── Score components table ── */
.bd-table-wrap{overflow-x:auto;padding:0 16px 16px;}
.bd-table{width:100%;border-collapse:collapse;font-size:12px;}
.bd-table th{padding:7px 6px;text-align:center;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--border);white-space:nowrap;line-height:1.3;}
.bd-table th:first-child{text-align:left;}
.bd-table td{padding:9px 6px;text-align:center;border-bottom:1px solid var(--border2);color:var(--ink2);}
.bd-table td:first-child{text-align:left;font-weight:600;color:var(--ink);white-space:nowrap;cursor:pointer;}
.bd-table td:first-child:hover{text-decoration:underline;}
.bd-table tr.is-me td{background:var(--bg2);}
.bd-table td.total-val{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ink);}
.bd-badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:19px;border-radius:9px;font-size:11px;font-weight:700;padding:0 5px;}

.bd-badge.zero{background:var(--bg2);color:var(--muted);}
.bd-name-link{cursor:pointer;}
.bd-name-link:hover{text-decoration:underline;}
/* Score Race */
.chart-wrap{margin:12px 16px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.chart-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.chart-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;}
.chart-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.chart-replay{font-size:11px;font-weight:600;color:var(--muted);border:1px solid var(--border2);background:var(--bg2);border-radius:var(--rs);padding:5px 10px;cursor:pointer;}
#lb-race-svg{width:100%;display:block;}
.lb-legend{display:flex;flex-wrap:wrap;gap:8px 16px;padding:12px 16px;border-top:1px solid var(--border);}
.lb-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--ink2);}
.lb-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.lb-legend-me{font-weight:700;color:var(--ink);}
.lb-mini-podium{margin:0 16px 16px;display:flex;flex-direction:column;gap:4px;}
.lb-mini-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:13px;}
.lb-mini-row.is-me{border-color:var(--ink);background:var(--bg2);font-weight:600;}
.lb-mini-rank{width:20px;font-size:11px;font-weight:700;color:var(--muted);}
.lb-mini-swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.lb-mini-name{flex:1;}
.lb-mini-score{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;}
.lb-mini-pts{font-size:10px;color:var(--muted);}
/* The Dude dream canvas */
.lb-dream-wrap{position:relative;background:#06030f;overflow:hidden;min-height:360px;}
#lb-dream-canvas{display:block;width:100%;height:auto;cursor:pointer;}
.lb-dream-text{position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);text-align:center;padding:16px;font-family:'Playfair Display',serif;font-size:28px;font-weight:700;letter-spacing:.28em;color:#c9a84c;text-shadow:0 0 30px rgba(201,168,76,.95),0 0 80px rgba(201,168,76,.5),0 0 140px rgba(201,168,76,.2);opacity:0;transition:opacity 1.4s ease;pointer-events:none;}
.lb-dream-text.visible{opacity:1;}
.lb-dream-replay{position:absolute;top:12px;right:12px;padding:5px 12px;border:1px solid rgba(201,168,76,.35);color:rgba(201,168,76,.7);font-family:'Courier New',monospace;font-size:9px;font-weight:700;letter-spacing:.1em;cursor:pointer;background:rgba(6,3,15,.7);border-radius:3px;}
/* Rick Roll toast */
.rr-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:white;font-size:13px;font-weight:600;padding:10px 20px;border-radius:999px;white-space:nowrap;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;pointer-events:none;}
.rr-toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ════════════════════════════════════
   MISC
════════════════════════════════════ */
.how-to-arrow{transform:rotate(180deg);}
details:not([open]) .how-to-arrow{transform:rotate(0deg);}
details summary::-webkit-details-marker{display:none;}
.warn-card{background:var(--gold-light);border:1px solid var(--amber);border-radius:var(--rs);padding:12px 14px;margin:0 16px 14px;font-size:13px;color:var(--gold);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.no-data{padding:40px 16px;text-align:center;color:var(--muted);font-size:13px;letter-spacing:.03em;}
.divider{height:1px;background:var(--border);margin:8px 0;}
.bracket-round-tabs{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
.bracket-round-tabs::-webkit-scrollbar{display:none;}
.rtab{background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:7px 14px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;letter-spacing:.04em;text-transform:uppercase;}
.rtab.active{background:var(--ink);border-color:var(--ink);color:#fff;}

/* ════════════════════════════════════
   MOBILE POLISH
════════════════════════════════════ */

/* ── ring-sub sits below % ── */
.ring-sub{display:block;font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:1px;}

/* ── hero-sub below ring ── */
.hero-sub{font-size:13px;color:var(--muted);margin-top:0;}

/* ── Wildcards: full-width pills deserve bigger touch targets ── */
.wc-group-section .team-pill{padding:11px 12px;margin-bottom:6px;min-height:44px;}
.wc-group-section .flag-circle{width:26px;height:26px;font-size:16px;}
.wc-group-section .pill-name{font-size:13px;}
.wc-group-section .pill-badge{width:20px;height:20px;font-size:10px;}

/* ── Buttons: flex center for loading state + better tap targets ── */
.btn-primary{display:flex;align-items:center;justify-content:center;min-height:50px;}
.btn-secondary{display:flex;align-items:center;justify-content:center;min-height:46px;}

/* ── User cards: comfortable tap target ── */
.user-card{min-height:60px;}

/* ── Section header: cleaner ── */
.section-header{padding:14px 18px 10px;}

/* ── Screen hero: a touch more generous ── */
.screen-hero{padding:28px 18px 20px;}
.screen-h2{font-size:28px;}
.screen-eyebrow{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px;}

/* ── Smooth scroll on iOS ── */
.screen{-webkit-overflow-scrolling:touch;}

/* ── Action bar: extra bottom breathing room on iPhone ── */
.action-bar{padding:16px;padding-bottom:max(16px,env(safe-area-inset-bottom));}

/* ── Bracket round tabs: chunky enough to tap ── */
.rtab{padding:9px 16px;}

/* ── Wider devices: constrain and center ── */
@media(min-width:480px){
  .home-hero h2{font-size:36px;}
  .quick-grid{gap:10px;padding:18px;}
  .groups-grid{gap:10px;padding:16px;}
  .wc-group-section .team-pill{padding:13px 14px;}
  .bottom-nav{max-width:480px;left:50%;transform:translateX(-50%);}
  .top-bar{max-width:100%;}
}

/* ── Very small phones: 2-col → 1-col for groups ── */
@media(max-width:340px){
  .groups-grid{grid-template-columns:1fr;}
  .quick-grid{grid-template-columns:repeat(3,1fr);gap:5px;padding:12px;}
  .qcard{padding:13px 5px 11px;min-height:80px;}
  .home-hero h2{font-size:26px;}
}

}
#bktree-wrap:fullscreen .bktree-inner,#bktree-wrap:-webkit-full-screen .bktree-inner{
  min-width:unset;padding-bottom:16px;
}

  if(S.allData?.bracketOpen===true)return true;
  return Date.now()>=BRACKET_OPEN_DATE.getTime();
}
function bracketCountdown(){
  const ms=BRACKET_OPEN_DATE.getTime()-Date.now();
  if(ms<=0)return null;
  const d=Math.floor(ms/86400000);
  const h=Math.floor((ms%86400000)/3600000);
  const m=Math.floor((ms%3600000)/60000);
  if(d>0)return`${d}d ${h}h`;
  if(h>0)return`${h}h ${m}m`;
  return`${m}m`;
}

function slotTeam(slot,picks){
  if(!picks)return null;
  if(slot.type==='fixed')return slot.team;
  if(slot.type==='winner'){const g=(picks.groups||{})[slot.group];return g?.[0]||null;}
  if(slot.type==='runner'){const g=(picks.groups||{})[slot.group];return g?.[1]||null;}
  if(slot.type==='wildcard'){return(picks.wildcards||[])[slot.wcIdx]||null;}
  return null;
}
function r32Teams(mi,picks){return R32_SLOTS[mi].map(s=>slotTeam(s,picks));}
function matchTeams(key,mi,b,picks){
  if(key==='r32')return r32Teams(mi,picks);
  const prev=ROUNDS[ROUNDS.indexOf(key)-1];
  return[(b[prev]||[])[mi*2]||null,(b[prev]||[])[mi*2+1]||null];
}
function completion(picks){
  if(!picks)return 0;let done=0,total=0;
  GROUPS.forEach(g=>{total++;if((picks.groups[g.id]||[]).length===2)done++;});
  total++;if((picks.wildcards||[]).length===8)done++;
  if(isBracketOpen()){
    const b=picks.bracket||{};
    [['r32',16],['r16',8],['qf',4],['sf',2]].forEach(([k,n])=>{
      total+=n;done+=(b[k]||[]).filter(Boolean).length;});
    total++;if(b.champion)done++;
  }
  return Math.round(done/total*100);
}

// Returns set of all teams eliminated so far
function eliminatedTeams(rb){
  const out=new Set();
  ROUNDS.forEach(k=>{
    (rb[k]||[]).forEach((w,i)=>{
      if(!w)return;
      const[t1,t2]=matchTeams(k,i,rb,{});
      if(t1&&t1!==w)out.add(t1);
      if(t2&&t2!==w)out.add(t2);
    });
  });
  return out;
}

function rBracketTree(picks,results){
  if(!isBracketOpen())return'';
  const rb=results?.bracket||{};const pb=picks?.bracket||{};

  // ── Natural-pixel dimensions, horizontal + vertical scroll ──
  // Boxes at comfortable readable size. U must be > BH to avoid overlap.
  const TH=20,       // row height — gives ~14px usable font area
        BH=TH*2,     // box height = 40px
        BW=108,      // box width
        GAP=18,      // gap between round columns
        CW=BW+GAP;   // column stride = 126px
  const U=52;        // vertical spacing per R32 slot (12px breathing room above/below box)
  const H=16*U;      // 832px total — scrollable vertically
  const RX=[0,CW,2*CW,3*CW,4*CW]; // x-left of each column
  const SVG_W=RX[4]+BW+60; // +60 for champion emoji + trophy right of Final
  const SVG_H=H;

  const roundKeys=['r32','r16','qf','sf'];
  const counts=[16,8,4,2,1];
  const LNC='var(--border2)';

  // Center-Y of match i in round-index ri (0=R32 … 4=Final)
  function ym(ri,i){
    if(ri===4)return H/2;
    const sp=U*Math.pow(2,ri);
    return i*sp+sp/2;
  }
  function getTeams(ri,i){
    if(ri===4)return[(rb.sf||[])[0]||null,(rb.sf||[])[1]||null];
    return matchTeams(roundKeys[ri],i,rb,picks||{});
  }
  function getW(ri,i){
    if(ri===4)return rb.champion||null;
    return(rb[roundKeys[ri]]||[])[i]||null;
  }
  function getPick(ri,i){
    if(ri===4)return pb.champion||null;
    return(pb[roundKeys[ri]]||[])[i]||null;
  }

  const ln=[],bx=[];

  // ── Connector lines ──
  for(let ri=1;ri<=4;ri++){
    for(let pi=0;pi<counts[ri];pi++){
      const yP=ym(ri,pi),yC0=ym(ri-1,pi*2),yC1=ym(ri-1,pi*2+1);
      const xE=RX[ri-1]+BW,xN=RX[ri],xM=(xE+xN)/2;
      ln.push(`<line x1="${xE}" y1="${yC0}" x2="${xM}" y2="${yC0}" stroke="${LNC}" stroke-width="1"/>`);
      ln.push(`<line x1="${xE}" y1="${yC1}" x2="${xM}" y2="${yC1}" stroke="${LNC}" stroke-width="1"/>`);
      ln.push(`<line x1="${xM}" y1="${yC0}" x2="${xM}" y2="${yC1}" stroke="${LNC}" stroke-width="1"/>`);
      ln.push(`<line x1="${xM}" y1="${yP}" x2="${xN}" y2="${yP}" stroke="${LNC}" stroke-width="1"/>`);
    }
  }

  // ── Match box renderer ──
  function drawBox(rx,by,t1,t2,w,up){
    const ok=!!(w&&up===w),ng=!!(w&&up&&up!==w);
    const bc=ok?'#16a34a':ng?'#dc2626':'var(--border)';
    const sw=ok||ng?'2':'1.5';
    bx.push(`<rect x="${rx}" y="${by}" width="${BW}" height="${BH}" rx="6" fill="var(--surface)" stroke="${bc}" stroke-width="${sw}"/>`);
    bx.push(`<line x1="${rx+4}" y1="${by+TH}" x2="${rx+BW-4}" y2="${by+TH}" stroke="var(--border)" stroke-width="1"/>`);
    [t1,t2].forEach((t,ti)=>{
      const ty=by+ti*TH;
      const isW=!!(w&&w===t),isL=!!(w&&t&&!isW);
      if(isW)bx.push(`<rect x="${rx+2}" y="${ty+2}" width="${BW-4}" height="${TH-4}" rx="4" fill="${ok?'rgba(22,163,74,.13)':'rgba(100,116,139,.1)'}"/>`);
      if(t){
        bx.push(`<text x="${rx+5}" y="${ty+TH-4}" font-size="13" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">${f(t)}</text>`);
        const nc=isL?'var(--border2)':'var(--ink)';
        const fw=isW?'700':'400';
        const deco=isL?'opacity:.4;':'';
        bx.push(`<text x="${rx+23}" y="${ty+TH-5}" font-size="11" fill="${nc}" font-weight="${fw}" style="${deco}">${sh(t)}</text>`);
        if(up===t){
          const dc=!w?'var(--muted)':ok?'#16a34a':'#dc2626';
          bx.push(`<circle cx="${rx+BW-9}" cy="${ty+Math.round(TH/2)}" r="5" fill="${dc}"/>`);
          if(w)bx.push(`<text x="${rx+BW-12.5}" y="${ty+Math.round(TH/2)+4}" font-size="7" font-weight="700" fill="white">${ok?'✓':'✗'}</text>`);
        }
      }else{
        bx.push(`<text x="${rx+5}" y="${ty+TH-5}" font-size="10" fill="var(--muted)">TBD</text>`);
      }
    });
  }

  // ── Main bracket ──
  for(let ri=0;ri<=4;ri++){
    for(let i=0;i<counts[ri];i++){
      const yc=ym(ri,i),by=Math.round(yc-BH/2),rx=RX[ri];
      const[t1,t2]=getTeams(ri,i);
      const w=getW(ri,i),up=getPick(ri,i);
      drawBox(rx,by,t1,t2,w,up);
    }
  }

  // ── Champion display right of Final ──
  const champ=rb.champion;
  const champY=Math.round(ym(4,0));
  if(champ){
    bx.push(`<text x="${RX[4]+BW+6}" y="${champY+4}" font-size="22" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">${f(champ)}</text>`);
    bx.push(`<text x="${RX[4]+BW+7}" y="${champY+24}" font-size="14" font-weight="700" fill="var(--amber)">🏆</text>`);
  }

  // ── 3rd place section (below main bracket as HTML strip) ──
  function getThirdTeams(){
    const sf0=[...matchTeams('sf',0,rb,picks||{})];
    const sf1=[...matchTeams('sf',1,rb,picks||{})];
    const w0=(rb.sf||[])[0],w1=(rb.sf||[])[1];
    const l0=w0?sf0.find(t=>t&&t!==w0)||null:null;
    const l1=w1?sf1.find(t=>t&&t!==w1)||null:null;
    return[l0||null,l1||null];
  }
  const[th1,th2]=getThirdTeams();
  const thW=rb.third||null,thUp=pb.third||null;
  const thirdHtml=(th1||th2)?`
  <div style="margin-top:10px;padding:9px 0 0;border-top:1px solid var(--border)">
    <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px">🥉 3rd Place Match</div>
    <div style="display:flex;align-items:center;gap:10px">
      ${[th1,th2].map((t,ti)=>`<div style="flex:1;display:flex;align-items:center;gap:6px;background:var(--surface);border:1.5px solid ${thUp&&thW?(thUp===thW?(thUp===t?'#16a34a':'var(--border)'):(thUp===t?'#dc2626':'var(--border)')):'var(--border)'};border-radius:8px;padding:6px 8px">
        <span style="font-size:16px">${t?f(t):'🏳'}</span>
        <span style="font-size:11px;font-weight:${thW===t?700:400};color:${thW&&thW!==t?'var(--muted)':'var(--ink)'}">${t?sh(t):'TBD'}</span>
        ${thW===t?`<span style="font-size:10px;margin-left:auto">🥉</span>`:''}
        ${thUp===t&&!thW?`<span style="font-size:8px;background:var(--bg2);color:var(--muted);padding:1px 4px;border-radius:3px;margin-left:auto">pick</span>`:''}
        ${thUp===t&&thW===t?`<span style="font-size:8px;background:var(--green-light);color:var(--green);padding:1px 4px;border-radius:3px;font-weight:700;margin-left:auto">✓ +${POINTS.third}</span>`:''}
        ${thUp===t&&thW&&thW!==t?`<span style="font-size:8px;background:var(--red-light);color:var(--red);padding:1px 4px;border-radius:3px;font-weight:700;margin-left:auto">✗</span>`:''}
      </div>`).join(`<div style="font-size:9px;color:var(--muted);font-weight:700;flex-shrink:0">VS</div>`)}
    </div>
  </div>`:''

  const rLabels=['R32','R16','QF','SF','Final'];
  return`
<div class="section-header" style="margin-top:4px">
  <span class="section-title">Tournament Bracket</span>
  <span style="font-size:10px;color:var(--muted);font-weight:400;margin-left:8px;cursor:pointer" onclick="fullscreenBracketTree()">⛶ tap to expand</span>
</div>
<div id="bktree-wrap" onclick="fullscreenBracketTree()" style="overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;padding:0 14px 4px;cursor:pointer">
  <div class="bktree-inner" style="min-width:${SVG_W}px;padding-bottom:4px">
    <div style="display:flex;margin-bottom:6px">
      ${rLabels.map(l=>`<div style="width:${CW}px;flex-shrink:0;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em">${l}</div>`).join('')}
    </div>
    <svg width="${SVG_W}" height="${SVG_H}" xmlns="http://www.w3.org/2000/svg" style="display:block;overflow:visible">
      ${ln.join('')}
      ${bx.join('')}
    </svg>
    ${thirdHtml}
  </div>
</div>
<div style="display:flex;gap:14px;padding:6px 14px 12px;font-size:11px;color:var(--muted)">
  <span style="display:flex;align-items:center;gap:5px"><svg width="9" height="9" style="overflow:visible;display:inline-block"><circle cx="4.5" cy="4.5" r="4" fill="#16a34a"/></svg>your pick ✓</span>
  <span style="display:flex;align-items:center;gap:5px"><svg width="9" height="9" style="overflow:visible;display:inline-block"><circle cx="4.5" cy="4.5" r="4" fill="#dc2626"/></svg>your pick ✗</span>
  <span style="display:flex;align-items:center;gap:5px"><svg width="9" height="9" style="overflow:visible;display:inline-block"><circle cx="4.5" cy="4.5" r="4" fill="var(--muted)"/></svg>pending</span>
</div>`;
}

function rBracketResultsUser(picks,results){
  const rb=results?.bracket||{};const pb=picks?.bracket||{};
  const hasAny=isBracketOpen()||ROUNDS.some(k=>(rb[k]||[]).some(Boolean));
  if(!hasAny)return'';
  const elim=eliminatedTeams(rb);
  const defs=[{key:'r32',label:'Round of 32',pts:POINTS.r32,n:16},{key:'r16',label:'Round of 16',pts:POINTS.r16,n:8},{key:'qf',label:'Quarterfinals',pts:POINTS.qf,n:4},{key:'sf',label:'Semifinals',pts:POINTS.sf,n:2}];

  // ── Dedicated R32 matchup card ────────────────────────
  function r32Card(i){
    const[t1,t2]=matchTeams('r32',i,rb,picks||{});
    const winner=(rb.r32||[])[i];
    const userPick=(pb.r32||[])[i];
    if(!t1&&!t2)return'';
    const ko=new Date(R32_KICKOFFS[i]);
    const now=new Date();
    const elapsed=now-ko;
    const isLive=!winner&&elapsed>=0&&elapsed<9000000; // live only within 2.5h of kickoff
    const isPending=!winner&&now<ko;
    const isCorrect=winner&&userPick===winner;
    const isWrong=winner&&userPick&&userPick!==winner;
    const bdrColor=isCorrect?'var(--green)':isWrong?'var(--red)':'var(--border)';
    const bdrW=isCorrect||isWrong?'2px':'1.5px';
    const pst=ko.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:'America/Los_Angeles'});
    const est=ko.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:'America/New_York'});
    const timeStr=`${pst} PT · ${est} ET`;
    const centerLabel=isLive?'🟢 Live':isPending?timeStr:'';
    const pickBadge=(t)=>{
      if(!userPick||userPick!==t)return'';
      if(!winner)return`<span style="font-size:8px;background:var(--bg2);color:var(--muted);padding:1px 4px;border-radius:4px;font-weight:600;margin-left:auto;flex-shrink:0">pick</span>`;

    };
    const teamRow=(t)=>{
      if(!t)return'';
      const isW=winner===t;const isL=winner&&!isW;

        <span style="font-size:17px;line-height:1;flex-shrink:0">${f(t)}</span>

  }

  // ── Shared card for R16/QF/SF ─────────────────────────
  function matchCard(key,i){
    const[t1,t2]=matchTeams(key,i,rb,picks||{});

        ${winner===t1?`<span style="margin-left:auto;font-size:10px;flex-shrink:0">⚽</span>`:''}
      </div>

        ${winner===t2?`<span style="margin-left:auto;font-size:10px;flex-shrink:0">⚽</span>`:''}
      </div>
      <div style="margin-top:8px;padding-top:7px;border-top:1px solid var(--border);text-align:center;font-size:10px;font-weight:700">
        ${!winner?`<span style="color:var(--muted)">Pending</span>`:

  const playedDefs=defs.filter(({key})=>key==='r32'?isBracketOpen():(rb[key]||[]).some(Boolean));
  const champ=picks?.bracket?.champion;
  const champElim=champ&&elim.has(champ);
  const champWon=rb.champion&&champ===rb.champion;
  const champWrong=rb.champion&&champ&&champ!==rb.champion;
  const thirdPick=picks?.bracket?.third;

  const thirdWon=thirdResult&&thirdPick===thirdResult;

  return`

      <div style="font-size:10px;font-weight:700;color:${champWon?'var(--gold)':'var(--muted)'};text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">🏆 My Champion Pick</div>
      <div style="font-size:22px;font-weight:800;${champElim?'text-decoration:line-through;opacity:.5':''}color:${champWon?'var(--gold)':'var(--ink)'}">${champ?f(champ)+' '+champ:'—'}</div>
      ${champElim?`<div style="font-size:10px;color:var(--red);margin-top:2px;font-weight:600">❌ Eliminated</div>`:''}
      ${champWon?`<div style="font-size:10px;color:var(--green);margin-top:2px;font-weight:700">🎉 Champion! +${POINTS.champion} pts</div>`:''}

      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">🥉 My 3rd Place Pick</div>
      <div style="font-size:18px;font-weight:700;color:var(--ink)">${f(thirdPick)} ${thirdPick}</div>
      ${thirdWon?`<div style="font-size:10px;color:#b46414;margin-top:2px;font-weight:700">🥉 Correct! +${POINTS.third} pts</div>`:''}
      ${thirdWrong?`<div style="font-size:10px;color:var(--red);margin-top:2px">Won: ${f(thirdResult)} ${thirdResult}</div>`:''}
      ${!thirdResult?`<div style="font-size:10px;color:var(--muted);margin-top:2px">Pending</div>`:''}
    </div>

  </div>`:''}
  ${playedDefs.map(({key,label,n})=>{
    const rr=rb[key]||[];const rp=pb[key]||[];
    const played=rr.filter(Boolean).length;

    const roundLabel={r32:'Round of 32',r16:'Round of 16',qf:'Quarterfinals',sf:'Semifinals'}[key];
    let cardsHTML;
    if(key==='r32'){
      const byDate={};
      for(let i=0;i<16;i++){const d=R32_DATES[i];if(!byDate[d])byDate[d]=[];byDate[d].push(i);}
      cardsHTML=Object.keys(byDate).sort().map(d=>{
        const dLabel=new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        const dayIdxs=byDate[d];
        const dayResults=(rb.r32||[]);
        const dayCorrect=dayIdxs.filter(i=>dayResults[i]&&(pb.r32||[])[i]===dayResults[i]).length;
        const dayPlayed=dayIdxs.filter(i=>!!dayResults[i]).length;
        const cards=dayIdxs.map(i=>r32Card(i)).filter(Boolean).join('');

          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">

            ${dayPlayed>0?`<span style="font-size:9px;color:var(--muted)">${dayCorrect}/${dayPlayed} correct</span>`:''}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${cards}</div>
        </div>`;
      }).join('');
    }else{
      cardsHTML=`<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch">${Array.from({length:n},(_,i)=>matchCard(key,i)).join('')}</div>`;

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">${roundLabel}</span>
        <span style="font-size:11px;color:var(--muted)">${correct}/${played} correct</span>
      </div>
      ${cardsHTML}
    </div>`;
  }).join('')}
  </details>`;
}

        const isFinalPick=champ&&(champ===finalA||champ===finalB);
        const sfA=rb.qf?.[0]||null;const sfB=rb.qf?.[1]||null;
        // predicted finalists = users sf picks
        const uSF0=(u.bracket?.sf||[])[0];const uSF1=(u.bracket?.sf||[])[1];

          <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:5px">${u.username}</div>
          <div style="font-size:15px;font-weight:800;${isElim?'text-decoration:line-through;opacity:.4':''}">
            ${champ?f(champ)+' '+sh(champ):'—'}
          </div>
          ${isWon?`<div style="font-size:9px;color:var(--amber);font-weight:700;margin-top:2px">🏆 Champion!</div>`:''}
          ${isElim&&!isWon?`<div style="font-size:9px;color:var(--red);font-weight:600;margin-top:2px">❌ Out</div>`:''}
          ${isFinalPick&&!isWon?`<div style="font-size:9px;color:var(--green);font-weight:600;margin-top:2px">✓ In final</div>`:''}
          ${(uSF0||uSF1)?`<div style="font-size:9px;color:var(--muted);margin-top:4px;border-top:1px solid var(--border);padding-top:3px">Final picks:<br>
            <span style="${uSFElim0?'text-decoration:line-through;opacity:.5':''}">${uSF0?f(uSF0)+' '+sh(uSF0):'?'}</span>${uSFElim0?` <span style="color:var(--red);font-size:8px">out</span>`:''}<br>
            <span style="${uSFElim1?'text-decoration:line-through;opacity:.5':''}">${uSF1?f(uSF1)+' '+sh(uSF1):'?'}</span>${uSFElim1?` <span style="color:var(--red);font-size:8px">out</span>`:''}
          </div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;

  const matchRows=defs.map(({key,label,pts,n})=>{
    const rr=rb[key]||[];const played=rr.filter(Boolean).length;if(!played)return'';
    return`
    <div>
      <div style="padding:8px 16px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:var(--surface)">${label} · +${pts} pts each</div>
      ${Array.from({length:n},(_,i)=>{
        const[t1,t2]=matchTeams(key,i,rb,{});const winner=rr[i];
        if(!t1&&!t2&&!winner)return'';
        const right=users.filter(u=>(u.bracket||{})[key]?.[i]===winner);
        const wrong=users.filter(u=>{const p=(u.bracket||{})[key]?.[i];return p&&p!==winner;});

            <div style="display:flex;align-items:center;gap:4px"><span style="font-size:15px">${f(t2||'')}</span><span style="font-size:12px;font-weight:${winner===t2?700:400};color:${winner===t2?'var(--ink)':'var(--muted)'}">${t2||'TBD'}</span>${winner===t2?`<span style="font-size:9px">⚽</span>`:''}</div>
          </div>

            ${wrong.length?`<div><span style="color:#dc2626;font-weight:700">✗ </span>${wrong.map(u=>`<span style="background:#fee2e2;border-radius:4px;padding:1px 5px">${u.username}</span>`).join(' ')}</div>`:''}
            ${none.length?`<div style="color:var(--muted)">— ${none.map(u=>u.username).join(', ')}</div>`:''}
            `}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  return champSection+matchRows;
}

function scoreUser(picks,results){
  if(!picks||!results)return 0;let sc=0;
  GROUPS.forEach(g=>{const a=(results.groups||{})[g.id]||[];
    ((picks.groups||{})[g.id]||[]).forEach(t=>{if(a.includes(t))sc+=POINTS.group;});});
  const aWC=results.wildcards||[];
  (picks.wildcards||[]).forEach(t=>{if(aWC.includes(t))sc+=POINTS.wildcard;});
  ROUNDS.forEach(k=>{const a=(results.bracket||{})[k]||[];
    ((picks.bracket||{})[k]||[]).forEach((t,i)=>{if(t&&t===a[i])sc+=POINTS[k];});});
  if(picks.bracket?.champion&&picks.bracket.champion===(results.bracket?.champion))sc+=POINTS.champion;
  if(picks.bracket?.third&&picks.bracket.third===(results.bracket?.third))sc+=POINTS.third;
  return sc;
}

function scoreBreakdown(picks,results){
  if(!picks||!results)return{groups:{hits:[],missed:[],pts:0},wildcards:{hits:[],missed:[],pts:0},r32:{hits:[],missed:[],pts:0},r16:{hits:[],missed:[],pts:0},qf:{hits:[],missed:[],pts:0},sf:{hits:[],missed:[],pts:0},third:{pick:null,correct:false,pts:0},champion:{pick:null,correct:false,pts:0},total:0};
  const out={groups:{hits:[],missed:[],pts:0},wildcards:{hits:[],missed:[],pts:0},r32:{hits:[],missed:[],pts:0},r16:{hits:[],missed:[],pts:0},qf:{hits:[],missed:[],pts:0},sf:{hits:[],missed:[],pts:0},third:{pick:picks.bracket?.third||null,correct:false,pts:0},champion:{pick:picks.bracket?.champion||null,correct:false,pts:0},total:0};
  GROUPS.forEach(g=>{
    const actual=(results.groups||{})[g.id]||[];
    ((picks.groups||{})[g.id]||[]).forEach(t=>{
      if(actual.includes(t)){out.groups.hits.push({team:t,group:g.id});out.groups.pts+=POINTS.group;}
      else{out.groups.missed.push({team:t,group:g.id});}
    });
  });
  const aWC=results.wildcards||[];
  (picks.wildcards||[]).forEach(t=>{
    if(aWC.includes(t)){out.wildcards.hits.push(t);out.wildcards.pts+=POINTS.wildcard;}
    else{out.wildcards.missed.push(t);}
  });
  ROUNDS.forEach(k=>{
    const actual=(results.bracket||{})[k]||[];
    ((picks.bracket||{})[k]||[]).forEach((t,i)=>{
      if(t&&t===actual[i]){out[k].hits.push(t);out[k].pts+=POINTS[k];}
      else if(t){out[k].missed.push(t);}
    });
  });
  if(out.third.pick&&out.third.pick===(results.bracket?.third)){out.third.correct=true;out.third.pts=POINTS.third;}
  if(out.champion.pick&&out.champion.pick===(results.bracket?.champion)){out.champion.correct=true;out.champion.pts=POINTS.champion;}
  out.total=out.groups.pts+out.wildcards.pts+out.r32.pts+out.r16.pts+out.qf.pts+out.sf.pts+out.third.pts+out.champion.pts;
  return out;
}

function showPlayerBreakdown(username){
  const user=(S.allData?.users||{})[username];
  const results=S.allData?.results||{};
  if(!user)return;
  const bd=scoreBreakdown(user,results);
  // Map plural section keys → POINTS keys (which are singular)
  const PKEY={groups:'group',wildcards:'wildcard',r32:'r32',r16:'r16',qf:'qf',sf:'sf'};
  function catSection(key,label){
    const c=bd[key];
    const ptsEach=POINTS[PKEY[key]];
    const all=[...c.hits.map(item=>({item,hit:true})),...c.missed.map(item=>({item,hit:false}))];
    if(!all.length)return`<div style="padding:0 20px 12px"><div class="bd-section-label">${label}</div><div style="font-size:12px;color:var(--muted);font-style:italic">No picks made yet</div></div>`;
    const rows=all.map(({item,hit})=>{
      const team=typeof item==='object'?item.team:item;
      const sub=typeof item==='object'?` <span style="font-size:10px;color:var(--muted)">Grp ${item.group}</span>`:'';
      return`<div class="bd-row">
        <div class="bd-hit-icon ${hit?'hit':'miss'}">${hit?'✓':'✗'}</div>
        <div class="bd-team" style="${hit?'':'opacity:.5'}">${f(team)} ${team}${sub}</div>
        <div class="bd-pts" style="${hit?'':'color:var(--muted)'}">${hit?'+'+ptsEach:'0'}</div>
      </div>`;
    }).join('');
    return`<div class="bd-section">
      <div class="bd-section-label">${label} · <b>${c.pts} pts</b> (${c.hits.length} of ${all.length} correct)</div>
      ${rows}
    </div>`;
  }
  const thirdSection=bd.third.pick?`<div class="bd-section">
    <div class="bd-section-label">🥉 3rd Place Pick · <b>${bd.third.pts} pts</b></div>
    <div class="bd-row">
      <div class="bd-hit-icon ${bd.third.correct?'hit':'miss'}">${bd.third.correct?'✓':'✗'}</div>
      <div class="bd-team" style="${bd.third.correct?'':'opacity:.5'}">${f(bd.third.pick)} ${bd.third.pick}</div>
      <div class="bd-pts" style="${bd.third.correct?'':'color:var(--muted)'}">${bd.third.correct?'+'+POINTS.third:'0'}</div>
    </div>
  </div>`:'';
  const champSection=bd.champion.pick?`<div class="bd-section">
    <div class="bd-section-label">🏆 Champion Pick · <b>${bd.champion.pts} pts</b></div>

    _:{bg:'var(--surface)',border:'var(--border)',color:'var(--ink)',sub:'var(--muted)',badge:'var(--bg2)',badgeC:'var(--muted)',bar:'var(--border2)',glow:'none'}
  }:{

    2:{bg:'linear-gradient(135deg,#f8fafc 0%,#e2e8f0 100%)',border:'#94a3b8',color:'#1e293b',sub:'#475569',badge:'#e2e8f0',badgeC:'#475569',bar:'#64748b',glow:'rgba(148,163,184,.14)'},

  const picks=S.myPicks||emptyPicks();

  const b=picks.bracket||{r32:Array(16).fill(null),r16:Array(8).fill(null),qf:Array(4).fill(null),sf:Array(2).fill(null),champion:null,third:null};
  const curTab=S.bracketTab||'r32';

  // ── R32 grid pick card ──
  function gridCard(idx){
    const[t1,t2]=r32Teams(idx,picks);

    const canPick=!locked&&!!t1&&!!t2;
    const teamBtn=(t)=>{

      ${teamBtn(t2)}
    </div>`;
  }

  // ── R32 date-grouped grid ──
  const byDate={};
  for(let i=0;i<16;i++){const d=R32_DATES[i];if(!byDate[d])byDate[d]=[];byDate[d].push(i);}
  const r32Picked=(b.r32||[]).filter(Boolean).length;
  const r32GridHtml=Object.keys(byDate).sort().map(d=>{
    const dLabel=new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    const dayCards=byDate[d].map(i=>gridCard(i)).join('');
    return`<div style="margin-bottom:16px">
      <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px">${dLabel}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${dayCards}</div>
    </div>`;
  }).join('');

  // ── Layout constants (for full bracket SVG tree) ──
  const MW=128, MH=52, CG=28, PG=6, OG=18;
  const COL={r32:0,r16:MW+CG,qf:2*(MW+CG),sf:3*(MW+CG),final:4*(MW+CG)};
  const CHAMP_X=COL.final+MW+CG;

  function mTop(round,idx){
    if(round==='r32'){const p=Math.floor(idx/2),i=idx%2;return p*(2*MH+PG+OG)+i*(MH+PG);}
    const prev={r16:'r32',qf:'r16',sf:'qf',final:'sf'}[round];
    const a=mTop(prev,idx*2)+MH/2,bb=mTop(prev,idx*2+1)+MH/2;
    return(a+bb)/2-MH/2;
  }

  const TOTAL_H=mTop('r32',15)+MH+10;

    const x=COL[round]||0,y=mTop(round,idx);

    return`<div class="bk-card${isPending?' dim':''}" style="left:${x}px;top:${y}px;width:${MW}px">

  const lines=[];
  function line(x1,y1,x2,y2){lines.push(`<line x1="${Math.round(x1)}" y1="${Math.round(y1)}" x2="${Math.round(x2)}" y2="${Math.round(y2)}"/>`);}

  // 3rd place pick UI — teams are SF losers derived from user's own SF picks

  const[th1,th2]=getThirdTeamsForPick();

function rUserPicksView(u){
  const isMe=u.username===S.username;
  const res=S.allData?.results||{};
  const sc=scoreUser(u,res);
  const hasRes=!!(res.groups&&Object.keys(res.groups).length);

  // Status helpers: c=correct, w=wrong, p=pending, n=none
  const gSt=(team,gid)=>{const a=(res.groups||{})[gid]||[];if(!a.length)return'p';return a.includes(team)?'c':'w';};
  const wcSt=(team)=>{const a=res.wildcards||[];if(a.length<8)return'p';return a.includes(team)?'c':'w';};
  const bSt=(pick,result)=>!pick?'n':!result?'p':pick===result?'c':'w';

  const badge=(s)=>s==='c'?'<span style="font-size:8px;color:#16a34a;font-weight:800;flex-shrink:0;line-height:1">✓</span>':s==='w'?'<span style="font-size:8px;color:#dc2626;font-weight:800;flex-shrink:0;line-height:1">✗</span>':'';
  const pillBg=(s)=>s==='c'?'#f0fdf4':s==='w'?'#fef2f2':'var(--surface)';
  const pillBdr=(s)=>s==='c'?'#86efac':s==='w'?'#fca5a5':'var(--border)';
  const pillClr=(s)=>s==='c'?'#15803d':s==='w'?'#dc2626':'var(--ink)';

  const pill=(team,st)=>`<div style="display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 5px 2px 4px;border-radius:5px;background:${pillBg(st)};border:1px solid ${pillBdr(st)};flex-shrink:0;max-width:84px;overflow:hidden"><span style="font-size:13px;line-height:1;flex-shrink:0">${f(team)}</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:${pillClr(st)};font-weight:${st==='c'?700:400}">${sh(team)}</span>${badge(st)}</div>`;
  const emptyPill=()=>'<div style="display:inline-flex;align-items:center;width:62px;height:22px;border-radius:5px;background:var(--bg2);border:1px dashed var(--border)"></div>';

  // Groups column
  const groupsHTML=GROUPS.map(g=>{
    const picks=(u.groups||{})[g.id]||[];
    return`<div style="display:flex;align-items:center;gap:5px;margin-bottom:5px">
      <div style="width:14px;font-size:9px;font-weight:700;color:var(--muted);flex-shrink:0;text-align:center">${g.id}</div>
      <div style="display:flex;gap:3px">${picks[0]?pill(picks[0],gSt(picks[0],g.id)):emptyPill()}${picks[1]?pill(picks[1],gSt(picks[1],g.id)):emptyPill()}</div>
    </div>`;
  }).join('');

  // Wildcards column
  const wcs=u.wildcards||[];
  const wcHTML=wcs.length?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">${wcs.map(t=>pill(t,wcSt(t))).join('')}</div>`:`<span style="font-size:11px;color:var(--muted)">Not picked</span>`;

  // Bracket right column
  const rb=u.bracket||{};const rRes=res.bracket||{};
  const roundSection=(key,label,pts,cols)=>{
    const size=ROUND_SIZES[key];
    const pills=Array.from({length:size},(_,i)=>{const pick=rb[key]?.[i],result=rRes[key]?.[i];const st=bSt(pick,result);return pick?pill(pick,st):emptyPill();}).join('');
    return`<div style="margin-bottom:10px"><div style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px">${label} <span style="font-weight:400;opacity:.7">+${pts}pts</span></div><div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:3px">${pills}</div></div>`;
  };

  const champPick=rb.champion,champResult=rRes.champion,champSt=bSt(champPick,champResult);
  const champHTML=`<div><div style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px">🏆 Champion <span style="font-weight:400;opacity:.7">+${POINTS.champion}pts</span></div>${champPick?pill(champPick,champSt):emptyPill()}${champSt==='c'?' <span style="font-size:12px">🎉</span>':''}</div>`;

  const avatar=u.bracket?.champion?`<div style="width:36px;height:36px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${f(u.bracket.champion)}</div>`:`<div style="width:36px;height:36px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0">${u.username[0].toUpperCase()}</div>`;

  return`${rNav('allpicks')}
<div class="screen">
  <div style="display:flex;align-items:center;gap:10px;padding:12px 14px 10px;border-bottom:1px solid var(--border)">
    <button class="back-btn" onclick="S.viewingUser=null;render()">←</button>
    ${avatar}
    <div style="flex:1;min-width:0">
      <div style="font-size:15px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.username}${isMe?' <span class="you-badge">you</span>':''}</div>
      <div style="font-size:10px;color:var(--muted)">${completion(u)}% complete${hasRes?' · '+sc+' pts':''}</div>

      <div style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:7px">Groups <span style="font-weight:400;opacity:.7">+${POINTS.group}pts</span></div>

function buildLbRaceData(ranked,results){
  const grpIds=GROUPS.map(g=>g.id);
  const allG=results.groups||{};
  const br=results.bracket||{};
  function partial(nG,wc,bKeys){
    const r={},g={};
    grpIds.slice(0,nG).forEach(id=>{if(allG[id])g[id]=allG[id];});
    if(Object.keys(g).length)r.groups=g;
    if(wc&&results.wildcards)r.wildcards=results.wildcards;
    if(bKeys.length){const b={};bKeys.forEach(k=>{if(br[k])b[k]=br[k];});if(Object.keys(b).length)r.bracket=b;}
    return r;
  }
  const pList=[
    {},
    partial(4,false,[]),
    partial(8,false,[]),
    partial(12,false,[]),
    partial(12,true,[]),
    partial(12,true,['r32']),
    partial(12,true,['r32','r16']),
    partial(12,true,['r32','r16','qf']),
    partial(12,true,['r32','r16','qf','sf']),
    (()=>{const p=partial(12,true,['r32','r16','qf','sf']);if(br.champion){if(!p.bracket)p.bracket={};p.bracket.champion=br.champion;}if(br.third){if(!p.bracket)p.bracket={};p.bracket.third=br.third;}return p;})()
  ];
  return ranked.map(({u},i)=>({
    name:u.username,isMe:u.username===S.username,
    color:LB_PALETTE[i%LB_PALETTE.length],
    scores:pList.map(pr=>scoreUser(u,pr))
  }));
}

}

function buildLbRaceSVGBase(){
  const svg=document.getElementById('lb-race-svg');
  if(!svg||!_lbRaceData)return;
  svg.innerHTML='';
  const ns='http://www.w3.org/2000/svg';
  const gEl=(tag,attrs={},parent=svg)=>{
    const el=document.createElementNS(ns,tag);
    Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
    parent.appendChild(el);return el;
  };
  const PAD={top:20,right:76,bottom:38,left:30};
  const W=440,H=280,cW=W-PAD.left-PAD.right,cH=H-PAD.top-PAD.bottom;
  const n=LB_CPS.length;
  const xP=i=>PAD.left+(i/(n-1))*cW;
  const yP=v=>PAD.top+cH-(v/_lbRaceMax)*cH;
  const step=_lbRaceMax<=100?25:50;
  for(let v=0;v<=_lbRaceMax;v+=step){
    const y=yP(v);
    gEl('line',{x1:PAD.left,y1:y,x2:W-PAD.right,y2:y,stroke:'#e5e2db','stroke-width':'1'});
    if(v>0)gEl('text',{x:PAD.left-4,y:y+4,'font-size':'9',fill:'#8a8278','text-anchor':'end','font-family':'system-ui'}).textContent=v;
  }
  const xWild=xP(4);
  gEl('line',{x1:xWild,y1:PAD.top,x2:xWild,y2:H-PAD.bottom,stroke:'#fde68a','stroke-width':'1.5','stroke-dasharray':'3,3'});
  gEl('text',{x:xWild+3,y:PAD.top+9,'font-size':'7.5',fill:'#b45309','font-family':'system-ui','font-weight':'700'}).textContent='KO';
  LB_CPS.forEach((cp,i)=>{
    const x=xP(i);
    gEl('line',{x1:x,y1:PAD.top,x2:x,y2:H-PAD.bottom,stroke:'#f3f1ee','stroke-width':'1'});
    gEl('text',{x,y:H-PAD.bottom+14,'font-size':'8',fill:'#8a8278','text-anchor':'middle','font-family':'system-ui'}).textContent=cp;
  });
  gEl('line',{x1:PAD.left,y1:H-PAD.bottom,x2:W-PAD.right,y2:H-PAD.bottom,stroke:'#ccc9c1','stroke-width':'1'});
  _lbRaceData.forEach((p,i)=>{
    gEl('path',{id:`lbp-${i}`,fill:'none',stroke:p.color,'stroke-width':p.isMe?'2.8':'1.8','stroke-linecap':'round','stroke-linejoin':'round',opacity:p.isMe?'1':'0.75',d:''});
    gEl('circle',{id:`lbd-${i}`,r:p.isMe?'4':'3',fill:p.color,opacity:'0',cx:'0',cy:'0'});
    const lbl=gEl('text',{id:`lbl-${i}`,'font-size':p.isMe?'10':'9','font-weight':p.isMe?'700':'500',fill:p.color,opacity:'0','font-family':'system-ui',x:'0',y:'0'});
    lbl.textContent=p.name.split(' ')[0];
  });
}

function runLbRace(){
  cancelAnimationFrame(lbRaceAnimFrame);
  lbRaceRan=true;
  buildLbRaceSVGBase();
  const PAD={top:20,right:76,bottom:38,left:30};
  const W=440,H=280,cW=W-PAD.left-PAD.right,cH=H-PAD.top-PAD.bottom;
  const n=LB_CPS.length;
  const xP=i=>PAD.left+(i/(n-1))*cW;
  const yP=v=>PAD.top+cH-(v/_lbRaceMax)*cH;
  const totalMs=2400,start=performance.now();
  function frame(now){
    const t=Math.min((now-start)/totalMs,1);
    const ease=t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
    if(!_lbRaceData)return;
    _lbRaceData.forEach((p,i)=>{
      const progress=ease*(n-1);
      const segIdx=Math.floor(progress);
      const segFrac=progress-segIdx;
      let d='';
      for(let j=0;j<=Math.min(segIdx,n-1);j++){
        const x=xP(j),y=yP(p.scores[j]);
        if(j===0)d+=`M ${x} ${y}`;
        else{const px=xP(j-1),py=yP(p.scores[j-1]),cx=(px+x)/2;d+=` C ${cx} ${py} ${cx} ${y} ${x} ${y}`;}
      }
      const dot=document.getElementById(`lbd-${i}`);
      const lbl=document.getElementById(`lbl-${i}`);
      const path=document.getElementById(`lbp-${i}`);
      if(!dot||!lbl||!path)return;
      if(segIdx<n-1){
        const x0=xP(segIdx),y0=yP(p.scores[segIdx]);
        const x1=xP(segIdx+1),y1=yP(p.scores[segIdx+1]);
        const cx=(x0+x1)/2;
        const bx=x0*(1-segFrac)**2+2*cx*(1-segFrac)*segFrac+(segFrac<0.5?cx:x1)*segFrac**2;
        const by=y0*(1-segFrac)**2+2*((y0+y1)/2)*(1-segFrac)*segFrac+y1*segFrac**2;
        d+=` C ${cx} ${y0} ${cx} ${y1} ${bx} ${by}`;
        dot.setAttribute('cx',bx);dot.setAttribute('cy',by);dot.setAttribute('opacity','1');
        lbl.setAttribute('opacity','0');
      } else {
        const lastX=xP(n-1),lastY=yP(p.scores[n-1]);
        dot.setAttribute('cx',lastX);dot.setAttribute('cy',lastY);dot.setAttribute('opacity','1');
        lbl.setAttribute('x',lastX+6);lbl.setAttribute('y',lastY+4);lbl.setAttribute('opacity','1');
        lbl.dataset.baseY=lastY+4;
      }
      path.setAttribute('d',d);
    });
    if(t<1){lbRaceAnimFrame=requestAnimationFrame(frame);}
    else{
      // De-collide labels: sort by Y, push apart with min gap
      const MIN_GAP=13;
      const lblEls=_lbRaceData.map((_,i)=>document.getElementById(`lbl-${i}`))
        .filter(Boolean).map(el=>({el,y:parseFloat(el.dataset.baseY||el.getAttribute('y')||0)}))
        .sort((a,b)=>a.y-b.y);
      for(let i=1;i<lblEls.length;i++){
        if(lblEls[i].y-lblEls[i-1].y<MIN_GAP)lblEls[i].y=lblEls[i-1].y+MIN_GAP;
        lblEls[i].el.setAttribute('y',lblEls[i].y);
      }
    }
  }
  lbRaceAnimFrame=requestAnimationFrame(frame);
}

function startLbDream(){
  if(lbDreamRaf)cancelAnimationFrame(lbDreamRaf);
  lbDreamStarted=true;
  const canvas=document.getElementById('lb-dream-canvas');
  const overlay=document.getElementById('lb-dream-text');
  if(!canvas||!overlay)return;
  overlay.classList.remove('visible');
  const ctx=canvas.getContext('2d');
  const CW=canvas.width,CH=canvas.height;
  ctx.fillStyle='#06030f';ctx.fillRect(0,0,CW,CH);
  let t=0;
  function drawPin(cx,cy,sz,color){
    ctx.save();ctx.translate(cx,cy);ctx.fillStyle=color;
    ctx.beginPath();ctx.arc(0,-sz*1.15,sz*0.38,0,Math.PI*2);ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-sz*0.42,sz*0.62);ctx.lineTo(sz*0.42,sz*0.62);
    ctx.lineTo(sz*0.28,-sz*0.52);ctx.lineTo(-sz*0.28,-sz*0.52);
    ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.ellipse(0,sz*0.62,sz*0.42,sz*0.14,0,0,Math.PI);ctx.fill();
    ctx.restore();
  }
  function drawBall(cx,cy,r){
    const g=ctx.createRadialGradient(cx-r*0.3,cy-r*0.3,r*0.05,cx,cy,r);
    g.addColorStop(0,'#4a4a4a');g.addColorStop(0.5,'#141414');g.addColorStop(1,'#060606');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.13)';
    [[-r*0.22,-r*0.15],[r*0.22,-r*0.15],[0,r*0.25]].forEach(([dx,dy])=>{
      ctx.beginPath();ctx.arc(cx+dx,cy+dy,r*0.18,0,Math.PI*2);ctx.fill();
    });
  }
  const RINGS=[{r:32,n:5,spd:0.55,sz:7.5},{r:70,n:9,spd:-0.38,sz:8.5},{r:112,n:13,spd:0.28,sz:9.5},{r:155,n:17,spd:-0.2,sz:10.5},{r:198,n:21,spd:0.14,sz:11}];
  function dreamFrame(){
    t+=0.009;
    ctx.fillStyle='rgba(6,3,15,0.22)';ctx.fillRect(0,0,CW,CH);
    const cx=CW/2,cy=CH/2;
    for(let l=0;l<10;l++){
      const a=(l/10)*Math.PI*2+t*0.18,hue=(l*36+t*18)%360;
      ctx.strokeStyle=`hsla(${hue},70%,28%,0.12)`;ctx.lineWidth=20;
      ctx.beginPath();ctx.moveTo(cx,cy);
      ctx.lineTo(cx+Math.cos(a)*CW*0.8,cy+Math.sin(a)*CH*0.8);ctx.stroke();
    }
    RINGS.forEach((ring,ri)=>{
      for(let i=0;i<ring.n;i++){
        const a=(i/ring.n)*Math.PI*2+t*ring.spd;
        const x=cx+Math.cos(a)*ring.r,y=cy+Math.sin(a)*ring.r;
        const hue=(t*36+ri*52+i*(360/ring.n))%360;
        drawPin(x,y,ring.sz,`hsla(${hue},92%,${62+14*Math.sin(t*1.8+i*0.7)}%,0.93)`);
      }
    });
    const bAngle=t*0.75,bDist=50+30*Math.sin(t*0.55);
    drawBall(cx+Math.cos(bAngle)*bDist,cy+Math.sin(bAngle)*bDist,11+4*Math.sin(t*1.3));
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,28);
    g.addColorStop(0,`hsla(${(t*55)%360},100%,80%,0.55)`);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,28,0,Math.PI*2);ctx.fill();
    if(t>5&&!overlay.classList.contains('visible'))overlay.classList.add('visible');
    lbDreamRaf=requestAnimationFrame(dreamFrame);
  }
  dreamFrame();
}

      const el=q('share-url');if(el){const r=document.createRange();r.selectNode(el);window.getSelection().removeAllRanges();window.getSelection().addRange(r);}
    });
  });
  q('b-save-g')?.addEventListener('click',savePicks);

  q('b-save-br')?.addEventListener('click',savePicks);
  q('b-save-res')?.addEventListener('click',doSaveResults);

  // Rick Roll: triple-click title within 600ms; single click → nav home
  let rrClicks=0,rrTimer;
  document.querySelector('.top-title')?.addEventListener('click',()=>{
    rrClicks++;clearTimeout(rrTimer);
    rrTimer=setTimeout(()=>rrClicks=0,600);
    if(rrClicks>=3){
      rrClicks=0;
      const t=document.getElementById('rr-toast');
      if(t){t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
      setTimeout(()=>window.open('https://www.youtube.com/watch?v=dQw4w9WgXcQ','_blank'),800);
    } else {nav('home');}
  });
}
