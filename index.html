async function doSetup(){
  const name=(document.getElementById('i-name')?.value||'').trim();
  const admin=document.getElementById('i-admin')?.checked;
  const apiKey=(document.getElementById('i-apikey')?.value||'').trim();
  if(!name){showErr('Please enter your name');return;}
  S.username=name;S.isAdmin=admin;
  if(apiKey)S.apiKey=apiKey;
  saveLocal();S.saving=true;render();
  try{
    S.allData=await fetchData();
    S.myPicks=S.allData.users?.[S.username]||emptyPicks();
  }catch(e){showErr('Could not load: '+e.message);S.saving=false;render();return;}
  S.saving=false;nav('home');
}

function toggleGroup(gid,team){
  if(isLocked())return;
  if(!S.myPicks)S.myPicks=emptyPicks();
  const g=S.myPicks.groups;if(!g[gid])g[gid]=[];
  const sel=g[gid];const idx=sel.indexOf(team);
  if(idx>=0){sel.splice(idx,1);}
  else if(sel.length<2){sel.push(team);}
  else{sel.shift();sel.push(team);}
  const adv=g[gid]||[];
  S.myPicks.wildcards=(S.myPicks.wildcards||[]).filter(t=>!adv.includes(t));
  R32_SLOTS.forEach(([s1,s2],mi)=>{
    if([s1,s2].some(s=>(s.type==='winner'||s.type==='runner')&&s.group===gid)){
      clearFromR32(mi,S.myPicks.bracket);
    }
  });
  render();
}

function clearFromR32(mi,b){
  if(!b)return;b.r32[mi]=null;
  clearDownstream('r32',mi,b);
}
function clearDownstream(key,mi,b){
  const ri=ROUNDS.indexOf(key);
  if(ri<ROUNDS.length-1){
    const nk=ROUNDS[ri+1];const nm=Math.floor(mi/2);
    if(b[nk])b[nk][nm]=null;
    clearDownstream(nk,nm,b);
  }
  b.champion=null;
}

function toggleWC(team){
  if(isLocked())return;
  if(!S.myPicks)S.myPicks=emptyPicks();
  const wc=S.myPicks.wildcards;const idx=wc.indexOf(team);
  if(idx>=0){wc.splice(idx,1);}
  else if(wc.length<8){wc.push(team);}
  else{toast('Already have 8 wildcards — deselect one first');}
  render();
}

function pickB(key,mi,team){
  if(isLocked())return;
  if(!S.myPicks)S.myPicks=emptyPicks();
  const b=S.myPicks.bracket;
  if(key==='champion'){b.champion=team;render();return;}
  if(key==='third'){b.third=team;render();return;}
  if(!b[key])b[key]=Array(ROUND_SIZES[key]).fill(null);
  b[key][mi]=team;
  clearDownstream(key,mi,b);
  render();
}

function switchTab(tab){
  S.picksTab=tab;
  document.querySelectorAll('.ptab').forEach((t,i)=>{
    const tabs=['groups','wildcards','champions'];
    t.classList.toggle('active',tabs[i]===tab);
  });
  const body=document.getElementById('picks-body');
  if(body){
    if(S.viewingUser){
      const u=S.allData?.users?.[S.viewingUser];
      body.innerHTML=u?rUserPicksBody(tab,u):'';
    }else{
      const users=Object.values(S.allData?.users||{});
      body.innerHTML=rPicksBody(tab,users);
    }
  }
}

function setBracketRound(r){
  S.bracketRound=r;render();window.scrollTo(0,0);
}

/* ── Team name normalization for football-data.org API ── */
const TEAM_NORM={
  "Korea Republic":"South Korea","Republic of Korea":"South Korea",
  "Côte d'Ivoire":"Ivory Coast","Cote d'Ivoire":"Ivory Coast","Ivory Coast":"Ivory Coast",
  "United States":"USA","United States of America":"USA",
  "Bosnia and Herzegovina":"Bosnia & Herz.","Bosnia & Herzegovina":"Bosnia & Herz.",
  "Congo DR":"DR Congo","Democratic Republic of Congo":"DR Congo","Congo, DR":"DR Congo",
  "Turkey":"Türkiye",
  "Czech Republic":"Czechia",
  "Cape Verde Islands":"Cape Verde","Cabo Verde":"Cape Verde",
  "New Zealand":"New Zealand","Saudi Arabia":"Saudi Arabia",
};
function normTeam(n){if(!n)return null;return TEAM_NORM[n]||n;}
function apiMatchTeams(m,t1,t2){
  if(!m||!t1||!t2)return false;
  const h=normTeam(m.homeTeam?.name),a=normTeam(m.awayTeam?.name);
  return(h===t1&&a===t2)||(h===t2&&a===t1);
}
// Extract the match winner, including games decided by penalty shootout.
// score.winner can be 'HOME_TEAM', 'AWAY_TEAM', 'DRAW' (when pens decided it),
// or null — so we fall back to score.penalties when the first two don't match.
function winnerFrom(m){
  const w=m.score?.winner;
  if(w==='HOME_TEAM')return normTeam(m.homeTeam?.name);
  if(w==='AWAY_TEAM')return normTeam(m.awayTeam?.name);
  // Penalty shootout fallback: whichever side scored more pens wins
  const ph=m.score?.penalties?.home??-1;
  const pa=m.score?.penalties?.away??-1;
  if(ph>pa)return normTeam(m.homeTeam?.name);
  if(pa>ph)return normTeam(m.awayTeam?.name);
  return null;
}

async function fetchLiveResults(){
  if(!S.isAdmin)return;
  if(!S.apiKey){showErr('Add a football-data.org API key in Settings first');return;}
  S.saving=true;render();
  try{
    const HD={'X-Auth-Token':S.apiKey,'x-requested-with':'XMLHttpRequest'};
    const base='https://api.football-data.org/v4';
    const pFetch=(url,opts={})=>fetch(`https://corsproxy.io/?url=${encodeURIComponent(url)}`,{...opts,headers:{...HD}});

    /* 1 — Group standings */
    const stRes=await pFetch(`${base}/competitions/WC/standings`);
    if(!stRes.ok)throw new Error(`API error ${stRes.status}: ${stRes.statusText}`);
    const stData=await stRes.json();

    const groups={};const thirds=[];
    for(const st of(stData.standings||[])){
      if(st.type!=='TOTAL')continue;
      const tbl=st.table||[];
      if(!tbl.length)continue;
      // Match this standing to our GROUPS by team name (robust to API group naming: GROUP_A, GROUP_1, etc.)
      const tblNames=tbl.map(r=>normTeam(r.team?.name));
      const matchedGroup=GROUPS.find(g=>g.teams.some(t=>tblNames.includes(t)));
      if(!matchedGroup)continue;
      groups[matchedGroup.id]=tblNames.slice(0,2);
      const t3=tbl[2];
      if(t3)thirds.push({team:normTeam(t3.team?.name),pts:t3.points,gd:t3.goalDifference,gf:t3.goalsFor});
    }

    /* 2 — Best 8 wildcards from 3rd-place teams */
    thirds.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
    const wildcards=thirds.slice(0,8).map(x=>x.team);

    /* 3 — Bracket: fetch ALL WC matches, resolve bracket by team-name matching (no stage filter) */
    const bracket={r32:Array(16).fill(null),r16:Array(8).fill(null),qf:Array(4).fill(null),sf:Array(2).fill(null)};
    let champion=null;

    const allMRes=await pFetch(`${base}/competitions/WC/matches`);
    let doneAll=[];
    if(allMRes.ok){
      const allMData=await allMRes.json();
      doneAll=(allMData.matches||[]).filter(m=>m.status==='FINISHED'||m.status==='AWARDED');
      console.log('[WC2026] All WC matches:',(allMData.matches||[]).length,'— done:',doneAll.length,
        doneAll.map(m=>({home:normTeam(m.homeTeam?.name),away:normTeam(m.awayTeam?.name),winner:m.score?.winner})));
    }else{console.warn('[WC2026] matches fetch failed:',allMRes.status);}

    // R32 — fixed matchups, match by team name
    for(let i=0;i<16;i++){
      const t1=slotTeam(R32_SLOTS[i][0],{groups,wildcards});
      const t2=slotTeam(R32_SLOTS[i][1],{groups,wildcards});
      if(!t1||!t2)continue;
      const m=doneAll.find(m=>apiMatchTeams(m,t1,t2));
      console.log(`[WC2026] R32 slot ${i} (${t1} vs ${t2}) →`,m?`winner:${m.score?.winner}`:'not played yet');
      if(!m)continue;
      bracket.r32[i]=winnerFrom(m);
    }

    // R16, QF, SF — derive teams from previous round winners
    for(const key of['r16','qf','sf']){
      const prev=ROUNDS[ROUNDS.indexOf(key)-1];
      const size=ROUND_SIZES[key];
      for(let i=0;i<size;i++){
        const t1=bracket[prev][i*2]||null,t2=bracket[prev][i*2+1]||null;
        if(!t1||!t2)continue;
        const m=doneAll.find(m=>apiMatchTeams(m,t1,t2));
        if(!m)continue;
        bracket[key][i]=winnerFrom(m);
      }
    }

    // Final — match the two SF winners
    const [sf0,sf1]=bracket.sf;
    if(sf0&&sf1){
      const fm=doneAll.find(m=>apiMatchTeams(m,sf0,sf1));
      if(fm){champion=winnerFrom(fm);}
    }

    /* 5 — Save */
    const data=await fetchData();
    data.results={groups,wildcards,bracket:{...bracket,champion},lastFetched:Date.now()};
    await writeData(data);S.allData=data;
    const r32w=bracket.r32.filter(Boolean).length;
    console.log('[WC2026] Saved bracket.r32:',bracket.r32);
    toast(`Results updated! Groups:${Object.keys(groups).length} · R32 winners:${r32w}/16`);
  }catch(e){showErr('Live fetch failed: '+e.message);}
  S.saving=false;render();
}

async function doSaveResults(){
  if(!S.isAdmin)return;
  const groups={};
  document.querySelectorAll('.res-g:checked').forEach(cb=>{
    const g=cb.dataset.g,t=cb.dataset.t;
    if(!groups[g])groups[g]=[];groups[g].push(t);
  });
  const wildcards=[...document.querySelectorAll('.res-wc:checked')].map(cb=>cb.dataset.t);
  // R32 bracket winners from radio buttons
  const bracketR32=Array(16).fill(null);
  for(let i=0;i<16;i++){const cb=document.querySelector(`[name="rbr32-${i}"]:checked`);if(cb&&cb.dataset.t)bracketR32[i]=cb.dataset.t;}
  // 3rd place winner
  const thirdCb=document.querySelector('[name="rb-third"]:checked');
  const thirdWinner=thirdCb?.dataset?.t||null;
  const locked=document.getElementById('i-lock')?.checked;
  const bracketOpen=document.getElementById('i-bracket-open')?.checked;
  S.saving=true;render();
  try{
    const data=await fetchData();
    const newBracket={...(data.results?.bracket||{}),r32:bracketR32};
    if(thirdWinner!==null)newBracket.third=thirdWinner||undefined;
    data.results={...(data.results||{}),groups,wildcards,bracket:newBracket};
    data.adminLocked=locked;data.bracketOpen=bracketOpen;
    await writeData(data);S.allData=data;toast('Results saved!');
  }catch(e){showErr(e.message);}
  S.saving=false;render();
}
